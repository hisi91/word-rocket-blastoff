<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>WORD ROCKET</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff;
    font-family: 'Courier New', monospace; user-select: none; -webkit-tap-highlight-color: transparent; }
  #game { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #bg, #fx { pointer-events: none; }
  .hud { position: absolute; top: 0; left: 0; right: 0; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
    font-size: 14px; text-shadow: 0 0 6px #000a; pointer-events: none; }
  .hud > div { background: rgba(0,0,0,.5); border: 2px solid #0ff8; border-radius: 6px; padding: 6px 10px; backdrop-filter: blur(4px); }
  .hearts { color: #ff3a6b; letter-spacing: 4px; font-size: 18px; }
  .combo { color: #ffd54a; }
  .level { color: #7cf; }
  .bottom { position: absolute; left: 0; right: 0; bottom: 0; padding: 10px 14px 14px 90px;
    display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
  .side-controls { position: absolute; left: 8px; bottom: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
  .side-controls button { padding: 6px 8px; font-size: 12px; min-width: 40px; text-align: center; }
  #input { width: min(280px, calc(100vw - 110px)); padding: 12px 16px; border: 2px solid #0ff;
    background: rgba(0,0,0,.7); color: #fff; font-family: inherit; font-size: 18px;
    border-radius: 8px; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 0; }
  #input:focus { box-shadow: 0 0 12px #0ff; }
  button { font-family: inherit; cursor: pointer; padding: 8px 14px; border-radius: 8px;
    border: 2px solid #0ff; background: rgba(0,30,40,.7); color: #0ff; font-size: 14px; }
  button.on { background: #0ff; color: #021; }
  #spoken { min-height: 22px; font-size: 13px; color: #fff; opacity: .9; text-align: center; text-shadow: 0 0 4px #000; }
  .feedback { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
    font-size: 36px; font-weight: bold; opacity: 0; pointer-events: none; z-index: 20;
    text-shadow: 0 0 20px currentColor, 0 0 4px #000; }
  .feedback.show { animation: pop 1.2s ease-out forwards; }
  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
  }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,10,.88); z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center; gap: 20px; }
  .overlay.hidden { display: none; }
  .title { font-size: clamp(40px, 9vw, 84px); font-weight: bold; letter-spacing: 6px;
    background: linear-gradient(90deg, #0ff, #f0f, #ffa500, #0ff);
    background-size: 300% 100%; -webkit-background-clip: text; background-clip: text;
    color: transparent; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { to { background-position: 300% 0; } }
  .subtitle { font-size: 14px; color: #bbb; max-width: 480px; line-height: 1.6; }
  .big { padding: 14px 32px; font-size: 18px; letter-spacing: 3px; }
  .endlist { max-width: 90vw; max-height: 30vh; overflow-y: auto; padding: 10px;
    border: 1px solid #0ff8; border-radius: 8px; background: rgba(0,0,0,.4); font-size: 13px; color: #fc6; }
  .level-banner { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; z-index: 25; pointer-events: none; opacity: 0; }
  .level-banner.show { animation: levelIn 2.5s ease-in-out forwards; }
  @keyframes levelIn {
    0% { opacity: 0; transform: scale(.5); }
    20%,80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5); }
  }
  .lb-text { font-size: clamp(36px, 8vw, 72px); font-weight: bold;
    color: #0ff; text-shadow: 0 0 30px #0ff, 0 0 60px #f0f; letter-spacing: 8px; text-align:center; }
  .lb-sub { font-size: 16px; color: #fff; margin-top: 12px; opacity: .8; }
  .loading { color:#0ff; font-size:18px; }
</style>
</head>
<body>
<div id="game">
  <canvas id="bg"></canvas>
  <canvas id="play"></canvas>
  <canvas id="fx"></canvas>

  <div class="hud">
    <div class="score">SCORE <span id="score">0</span></div>
    <div class="level">LVL <span id="lvl">1</span></div>
    <div class="combo">x<span id="mult">1</span> <span id="combo">0</span></div>
    <div class="hearts" id="hearts">♥♥♥</div>
  </div>

  <div class="bottom">
    <div id="spoken"></div>
    <input id="input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="devine l'objet..." />
  </div>
  <div class="side-controls">
    <button id="mic">🎤</button>
    <button id="lang">🌐</button>
    <button id="mute">🔊</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="level-banner" id="banner">
    <div>
      <div class="lb-text" id="bannerText"></div>
      <div class="lb-sub" id="bannerSub"></div>
    </div>
  </div>

  <div class="overlay" id="start">
    <div class="title">WORD ROCKET</div>
    <div class="subtitle">Des objets tombent du ciel — devine le mot en anglais avant qu'ils ne touchent ta fusée.
      <br>Les noms ne sont PAS affichés : à toi de reconnaître l'icône !
      <br>5 niveaux, du sol jusqu'au cosmos.</div>
    <div id="loadStatus" class="loading">Chargement des niveaux...</div>
    <button class="big" id="startBtn" disabled>START</button>
    <div class="subtitle">Cliquez ou appuyez sur ESPACE</div>
  </div>

  <div class="overlay hidden" id="end">
    <div class="title" style="font-size: clamp(32px,7vw,60px)">GAME OVER</div>
    <div id="endStats" style="font-size:18px;line-height:1.8"></div>
    <div id="missed" class="endlist"></div>
    <button class="big" id="replayBtn">REJOUER</button>
  </div>
</div>

<script>
(() => {
  // ===== Supabase config =====
  const SUPABASE_URL = "https://ihwthazjnbtovohizegf.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlod3RoYXpqbmJ0b3ZvaGl6ZWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDk1NzYsImV4cCI6MjA5NDc4NTU3Nn0.4DKOMT16JnOTIHuHOMqpcCPkLC6thIWQ7718mXaPQNQ";
  const ICON_URL = (path) => `${SUPABASE_URL}/storage/v1/object/public/game-icons/${path}?v=3d`;
  
  const LEVELS_CACHE_KEY = 'wr_levels_v4';
  const LEVELS_CACHE_TTL = 24 * 60 * 60 * 1000; // 24h
  const LEVELS_FETCH_TIMEOUT = 3500;
  const DEFAULT_LEVELS = [
    { id: 1, name: 'GROUND', total_objects: 5, folder_name: 'level-1', background_theme: 'meadow', fall_duration: 6, level_objects: [
      { word: 'house', icon_path: 'level-1/house.webp' }, { word: 'tree', icon_path: 'level-1/tree.webp' }, { word: 'leaf', icon_path: 'level-1/leaf.webp' }, { word: 'bird', icon_path: 'level-1/bird.webp' }, { word: 'dog', icon_path: 'level-1/dog.webp' },
    ] },
    { id: 2, name: 'BLUE SKY', total_objects: 5, folder_name: 'level-2', background_theme: 'blue-sky', fall_duration: 5.5, level_objects: [
      { word: 'cloud', icon_path: 'level-2/cloud.webp' }, { word: 'kite', icon_path: 'level-2/kite.webp' }, { word: 'plane', icon_path: 'level-2/plane.webp' }, { word: 'rainbow', icon_path: 'level-2/rainbow.webp' }, { word: 'balloon', icon_path: 'level-2/balloon.webp' },
    ] },
    { id: 3, name: 'SUNSET', total_objects: 5, folder_name: 'level-3', background_theme: 'sunset', fall_duration: 5, level_objects: [
      { word: 'pelican', icon_path: 'level-3/pelican.webp' }, { word: 'seagull', icon_path: 'level-3/seagull.webp' }, { word: 'sailboat', icon_path: 'level-3/sailboat.webp' }, { word: 'shell', icon_path: 'level-3/shell.webp' }, { word: 'lighthouse', icon_path: 'level-3/lighthouse.webp' },
    ] },
    { id: 4, name: 'TWILIGHT', total_objects: 5, folder_name: 'level-4', background_theme: 'twilight', fall_duration: 4.6, level_objects: [
      { word: 'bat', icon_path: 'level-4/bat.webp' }, { word: 'owl', icon_path: 'level-4/owl.webp' }, { word: 'firefly', icon_path: 'level-4/firefly.webp' }, { word: 'mountain', icon_path: 'level-4/mountain.webp' }, { word: 'lantern', icon_path: 'level-4/lantern.webp' },
    ] },
    { id: 5, name: 'STARRY NIGHT', total_objects: 5, folder_name: 'level-5', background_theme: 'starry-night', fall_duration: 4.2, level_objects: [
      { word: 'comet', icon_path: 'level-5/comet.webp' }, { word: 'telescope', icon_path: 'level-5/telescope.webp' }, { word: 'constellation', icon_path: 'level-5/constellation.webp' }, { word: 'moon', icon_path: 'level-5/moon.webp' }, { word: 'planet', icon_path: 'level-5/planet.webp' },
    ] },
  ];

  async function fetchLevels() {
    const cached = getCachedLevels();
    if (cached) {
      refreshLevelsCache().catch(() => {});
      return cached;
    }
    try {
      return await refreshLevelsCache();
    } catch {
      refreshLevelsCache().catch(() => {});
      return DEFAULT_LEVELS;
    }
  }

  function getCachedLevels() {
    try {
      const raw = localStorage.getItem(LEVELS_CACHE_KEY);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts < LEVELS_CACHE_TTL && Array.isArray(data) && data.length) return data;
    } catch {}
    return null;
  }

  async function refreshLevelsCache() {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), LEVELS_FETCH_TIMEOUT);
    const r = await fetch(`${SUPABASE_URL}/rest/v1/levels?select=id,name,total_objects,folder_name,background_theme,fall_duration,level_objects(word,icon_path)&id=lte.5&order=id.asc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
      signal: controller.signal,
    }).finally(() => clearTimeout(timeout));
    if (!r.ok) throw new Error("Failed to load levels");
    const data = await r.json();
    try { localStorage.setItem(LEVELS_CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
    return data;
  }

  // ===== Canvases =====
  const bgC = document.getElementById('bg');
  const playC = document.getElementById('play');
  const fxC = document.getElementById('fx');
  const bctx = bgC.getContext('2d');
  const pctx = playC.getContext('2d');
  const fctx = fxC.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    [bgC, playC, fxC].forEach(c => {
      c.width = W * DPR; c.height = H * DPR;
      c.style.width = W + 'px'; c.style.height = H + 'px';
      c.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
    });
    initBgElements();
  }
  window.addEventListener('resize', resize);

  // ===== Background themes (scrolling parallax = rocket flies) =====
  let stars = [], clouds = [], grassBlades = [];
  let scrollY = 0;
  function initBgElements() {
    stars = []; clouds = []; grassBlades = [];
    const SH = H * 2;
    for (let i=0;i<Math.floor(W*SH/3000);i++) stars.push({
      x:Math.random()*W, y:Math.random()*SH, r:Math.random()*1.4+.3,
      tw:Math.random()*Math.PI*2,
      color: Math.random() > 0.85 ? '#fdc' : Math.random() > 0.7 ? '#cdf' : '#fff',
      par: 0.3 + Math.random()*0.7,
    });
    for (let i=0;i<12;i++) clouds.push({
      x: Math.random()*W, y: Math.random()*SH,
      w: 80 + Math.random()*120, alpha: 0.5 + Math.random()*0.4,
      par: 0.4 + Math.random()*0.6,
    });
    for (let i=0;i<Math.floor(W/8);i++) grassBlades.push({
      x: Math.random()*W, h: 8 + Math.random()*16, sway: Math.random()*Math.PI*2,
    });
  }

  const THEME_GRADIENTS = {
    "meadow":      [["#7cc4ff", 0], ["#bde6ff", 0.5], ["#86c45a", 0.7], ["#3a7a2a", 1]],
    "blue-sky":    [["#3aa1ff", 0], ["#7cc4ff", 0.6], ["#cce7ff", 1]],
    "sunset":      [["#ff6b35", 0], ["#f7931e", 0.4], ["#e84393", 0.75], ["#6c5ce7", 1]],
    "twilight":    [["#2d1b4e", 0], ["#6c5ce7", 0.5], ["#a78bfa", 1]],
    "starry-night":[["#0a0a1a", 0], ["#141432", 0.6], ["#1e1e5a", 1]],
    "space":       [["#000010", 0], ["#02021a", 0.5], ["#0a0540", 1]],
    "nebula":      [["#0d001a", 0], ["#4a0d6e", 0.4], ["#8a2da8", 0.7], ["#d63ddc", 1]],
    "galaxy":      [["#0a0014", 0], ["#2d1b4e", 0.4], ["#7c4dff", 0.7], ["#ffc857", 1]],
    "blackhole":   [["#000", 0], ["#1a0500", 0.5], ["#5c2018", 0.8], ["#ff6b00", 1]],
    "cosmic":      [["#0a0014", 0], ["#4ade80", 0.3], ["#a78bfa", 0.6], ["#67e8f9", 1]],
  };

  // Vertical scroll speed per theme (pixels per frame). Higher = faster rocket ascent feel.
  const THEME_SCROLL = {
    "meadow": 3.5, "blue-sky": 4.2, "sunset": 5.0, "twilight": 5.8,
    "starry-night": 6.5, "space": 7.2, "nebula": 7.8, "galaxy": 8.4,
    "blackhole": 9.0, "cosmic": 9.5,
  };

  function drawBackground(theme, t) {
    bctx.clearRect(0,0,W,H);
    const stops = THEME_GRADIENTS[theme] || THEME_GRADIENTS["space"];
    const g = bctx.createLinearGradient(0, 0, 0, H);
    stops.forEach(([c, p]) => g.addColorStop(p, c));
    bctx.fillStyle = g; bctx.fillRect(0, 0, W, H);

    if (!(state.takeoff && state.takeoff.active)) scrollY += (THEME_SCROLL[theme] || 2);
    const SH = H * 2;
    const wrapY = (base, par) => {
      const y = ((base + scrollY * par) % SH + SH) % SH;
      return y > H ? y - SH : y;
    };

    if (["starry-night","space","nebula","galaxy","blackhole","cosmic","twilight"].includes(theme)) {
      stars.forEach(s => {
        s.tw += 0.04;
        bctx.globalAlpha = 0.4 + Math.sin(s.tw)*0.5;
        bctx.fillStyle = s.color;
        bctx.beginPath(); bctx.arc(s.x, wrapY(s.y, s.par), s.r, 0, Math.PI*2); bctx.fill();
      });
      bctx.globalAlpha = 1;
    }

    if (["blue-sky","sunset","meadow","twilight"].includes(theme)) {
      clouds.forEach(c => {
        const y = wrapY(c.y, c.par);
        bctx.globalAlpha = c.alpha;
        bctx.fillStyle = theme === "sunset" ? "#ffd1a4" : theme === "twilight" ? "#c8b8e8" : "#fff";
        bctx.beginPath();
        bctx.arc(c.x, y, c.w*0.3, 0, Math.PI*2);
        bctx.arc(c.x + c.w*0.3, y - c.w*0.08, c.w*0.32, 0, Math.PI*2);
        bctx.arc(c.x + c.w*0.6, y, c.w*0.28, 0, Math.PI*2);
        bctx.fill();
      });
      bctx.globalAlpha = 1;
    }

    // (ground grass removed — no horizontal scrolling grass on meadow)

    if (theme === "blackhole") {
      const cx = W/2, cy = H*0.35;
      const grad = bctx.createRadialGradient(cx, cy, 10, cx, cy, 180);
      grad.addColorStop(0, "#000"); grad.addColorStop(0.4, "#000");
      grad.addColorStop(0.55, "#ff6b00"); grad.addColorStop(0.7, "#ffaa44");
      grad.addColorStop(1, "transparent");
      bctx.fillStyle = grad;
      bctx.beginPath(); bctx.arc(cx, cy, 180, 0, Math.PI*2); bctx.fill();
    }
  }

  // ===== Audio =====
  let actx = null, muted = false;
  function ensureAudio() { if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }
  function beep(freq, dur=0.1, type='square', vol=0.08) {
    if (muted) return;
    try {
      ensureAudio();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq; g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + dur);
    } catch(e){}
  }
  const SFX = {
    hit: () => { beep(880,.08); setTimeout(()=>beep(1320,.1),60); },
    boom: () => { for (let i=0;i<6;i++) setTimeout(()=>beep(80+Math.random()*120,.15,'sawtooth',.1), i*40); },
    levelup: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,'triangle',.08), i*100)); },
    tick: () => { beep(220,.04,'square',.04); },
    start: () => { [392,523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.12,'square',.08), i*80)); },
  };

  // ===== Image cache =====
  const imgCache = new Map();
  // Remove near-white background pixels from loaded icons (flood-fill from edges)
  function keyOutWhite(img) {
    try {
      const w = img.naturalWidth, h = img.naturalHeight;
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      const cx = c.getContext('2d'); cx.drawImage(img, 0, 0);
      const id = cx.getImageData(0, 0, w, h); const d = id.data;
      const isWhite = (i) => d[i] > 235 && d[i+1] > 235 && d[i+2] > 235;
      const visited = new Uint8Array(w*h);
      const stack = [];
      for (let x = 0; x < w; x++) { stack.push(x, 0); stack.push(x, h-1); }
      for (let y = 0; y < h; y++) { stack.push(0, y); stack.push(w-1, y); }
      while (stack.length) {
        const y = stack.pop(), x = stack.pop();
        if (x<0||y<0||x>=w||y>=h) continue;
        const p = y*w + x; if (visited[p]) continue;
        const i = p*4; if (!isWhite(i)) continue;
        visited[p] = 1; d[i+3] = 0;
        stack.push(x+1,y, x-1,y, x,y+1, x,y-1);
      }
      // soften edge: pixels touching transparent that are still light → reduce alpha
      for (let y = 1; y < h-1; y++) for (let x = 1; x < w-1; x++) {
        const p = y*w + x, i = p*4;
        if (d[i+3] === 0) continue;
        if (d[i] > 220 && d[i+1] > 220 && d[i+2] > 220) {
          if (visited[p-1]||visited[p+1]||visited[p-w]||visited[p+w]) d[i+3] = 80;
        }
      }
      cx.putImageData(id, 0, 0);
      return c;
    } catch(e) { return img; }
  }
  function loadImg(path) {
    if (!path) return null;
    if (imgCache.has(path)) return imgCache.get(path);
    const img = new Image();
    img.crossOrigin = "anonymous";
    const wrap = { complete: false, naturalWidth: 0, naturalHeight: 0, _src: null };
    img.onload = () => {
      const processed = keyOutWhite(img);
      wrap._src = processed;
      wrap.naturalWidth = processed.width || img.naturalWidth;
      wrap.naturalHeight = processed.height || img.naturalHeight;
      wrap.complete = true;
    };
    img.src = ICON_URL(path);
    imgCache.set(path, wrap);
    return wrap;
  }

  // Constant on-screen icon size regardless of source dimensions
  const ICON_SIZE = 96;
  const ROCKET_SIZE = 110;

  // ===== Game state =====
  let LEVELS = [];
  let rocketImg = null;
  const state = {
    running: false, levelIdx: 0, score: 0, lives: 3, combo: 0,
    queue: [], current: null, missed: [], correct: 0, attempted: 0,
    rocket: { x: 0, y: 0, shake: 0, exploding: 0 },
    takeoff: { active: false, t0: 0, duration: 2600 },
  };
  const particles = [];

  function newFalling() {
    if (state.queue.length === 0) return null;
    const obj = state.queue.shift();
    const lvl = LEVELS[state.levelIdx];
    const fall = Number(lvl.fall_duration) || 5;
    const maxY = H - 140;
    return {
      word: obj.word, img: loadImg(obj.icon_path),
      x: ICON_SIZE/2 + 20 + Math.random() * Math.max(1, W - ICON_SIZE - 40),
      y: -ICON_SIZE/2,
      vy: (maxY + ICON_SIZE/2) / (fall * 60),
      maxY, tStart: performance.now(), lastTick: 0,
    };
  }

  function startGame() {
    SFX.start();
    state.levelIdx = 0; state.score = 0; state.lives = 3; state.combo = 0;
    state.missed = []; state.correct = 0; state.attempted = 0;
    loadLevel();
    document.getElementById('start').classList.add('hidden');
    document.getElementById('end').classList.add('hidden');
    state.running = true;
    // Takeoff sequence: ground visible, rocket sits on it, then lifts off.
    scrollY = 0;
    state.takeoff = { active: true, t0: performance.now(), duration: 2600 };
    const lvl = LEVELS[0];
    showBanner('LEVEL 1', lvl.name);
    setTimeout(() => { state.takeoff.active = false; nextObject(); }, state.takeoff.duration);
    updateHUD();
  }

  function loadLevel() {
    const lvl = LEVELS[state.levelIdx];
    state.queue = [...lvl.level_objects]
      .filter(o => o.icon_path) // only include those with generated icons
      .sort(()=>Math.random()-.5)
      .slice(0, lvl.total_objects);
  }

  function nextObject() {
    if (!state.running) return;
    if (state.queue.length === 0) {
      if (state.levelIdx >= LEVELS.length-1) return endGame(true);
      state.levelIdx++;
      loadLevel();
      SFX.levelup();
      const lvl = LEVELS[state.levelIdx];
      showBanner('LEVEL ' + (state.levelIdx+1), lvl.name);
      updateHUD();
      setTimeout(nextObject, 2200);
      return;
    }
    state.current = newFalling();
    document.getElementById('input').value = '';
    document.getElementById('spoken').textContent = '';
  }

  const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');

  function checkWord(text) {
    if (!state.running || !state.current) return;
    const t = norm(text);
    if (!t) return;
    document.getElementById('spoken').textContent = '🎙 ' + text;
    if (t === norm(state.current.word)) hitTarget();
  }

  function hitTarget() {
    const c = state.current;
    SFX.hit();
    state.combo++; state.correct++; state.attempted++;
    const mult = state.combo >= 5 ? 3 : state.combo >= 3 ? 2 : 1;
    state.score += 100 * mult * (state.levelIdx+1);
    explode(c.x, c.y, ['#ff0','#f80','#f08','#0ff']);
    showFeedback(c.word.toUpperCase() + ' ✓ +' + (100*mult*(state.levelIdx+1)), '#0f8');
    state.current = null;
    updateHUD();
    setTimeout(nextObject, 500);
  }

  function speak(text) {
    try {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.05; u.volume = muted ? 0 : 1;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }

  function loseLife() {
    SFX.boom();
    state.lives--; state.combo = 0; state.attempted++;
    const missedWord = state.current?.word;
    if (state.current) state.missed.push(state.current.word);
    state.rocket.shake = 30; state.rocket.exploding = 20;
    explode(state.rocket.x, state.rocket.y, ['#f00','#fa0','#ff0','#fff']);
    showFeedback('-1 ❤  ' + (missedWord?.toUpperCase() || ''), '#f33');
    if (missedWord) speak(missedWord);
    state.current = null;
    updateHUD();
    if (state.lives <= 0) { setTimeout(()=>endGame(false), 900); return; }
    setTimeout(nextObject, 1400);
  }

  function endGame(won) {
    state.running = false;
    document.getElementById('end').classList.remove('hidden');
    const acc = state.attempted ? Math.round(100*state.correct/state.attempted) : 0;
    document.getElementById('endStats').innerHTML =
      `Score : <b>${state.score}</b><br>Niveau atteint : <b>${state.levelIdx+1}</b><br>Réussite : <b>${acc}%</b>${won?'<br>🏆 VICTOIRE !':''}`;
    const m = document.getElementById('missed');
    m.innerHTML = state.missed.length ? '<b>Mots à réviser :</b><br>' + state.missed.join(' · ') : '<i>Aucun mot raté ! 🌟</i>';
  }

  function explode(x, y, colors) {
    for (let i=0; i<40; i++) {
      const a = Math.random()*Math.PI*2, s = Math.random()*4+1;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        life: 1, color: colors[Math.floor(Math.random()*colors.length)], size: Math.random()*3+1 });
    }
  }

  function updateHUD() {
    document.getElementById('score').textContent = state.score;
    document.getElementById('lvl').textContent = state.levelIdx+1;
    document.getElementById('hearts').textContent = '♥'.repeat(state.lives) + '♡'.repeat(Math.max(0,3-state.lives));
    const m = state.combo >= 5 ? 3 : state.combo >= 3 ? 2 : 1;
    document.getElementById('mult').textContent = m;
    document.getElementById('combo').textContent = state.combo;
  }

  function showFeedback(text, color) {
    const f = document.getElementById('feedback');
    f.textContent = text; f.style.color = color;
    f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
  }
  function showBanner(text, sub) {
    const b = document.getElementById('banner');
    document.getElementById('bannerText').textContent = text;
    document.getElementById('bannerSub').textContent = sub || '';
    b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
  }

  // ===== Render =====
  function drawImageContained(ctx, img, cx, cy, size) {
    const src = img && img._src ? img._src : img;
    if (!img || !img.complete || !img.naturalWidth) {
      ctx.fillStyle = '#0ff8';
      ctx.fillRect(cx - size/2, cy - size/2, size, size);
      return;
    }
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const scale = size / Math.max(iw, ih);
    const w = iw * scale, h = ih * scale;
    ctx.drawImage(src, cx - w/2, cy - h/2, w, h);
  }

  const GROUND_H = 80;
  function takeoffProgress() {
    if (!state.takeoff || !state.takeoff.active) return 1;
    const p = (performance.now() - state.takeoff.t0) / state.takeoff.duration;
    return Math.max(0, Math.min(1, p));
  }
  // ease-in-out cubic
  const easeInOut = p => p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3)/2;

  function drawGround() {
    const p = takeoffProgress();
    // Ground slides down off-screen as rocket lifts
    const eased = easeInOut(p);
    const yTop = H - GROUND_H + eased * GROUND_H;
    if (yTop >= H) return;
    // grass strip
    const g = pctx.createLinearGradient(0, yTop, 0, H);
    g.addColorStop(0, '#86c45a'); g.addColorStop(0.4, '#5a9a3a'); g.addColorStop(1, '#3a7a2a');
    pctx.fillStyle = g; pctx.fillRect(0, yTop, W, H - yTop);
    // grass blades on top edge
    pctx.strokeStyle = '#2d5a1a'; pctx.lineWidth = 2;
    for (let x = 4; x < W; x += 10) {
      const h = 6 + ((x*7) % 8);
      pctx.beginPath(); pctx.moveTo(x, yTop); pctx.lineTo(x + 1, yTop - h); pctx.stroke();
    }
  }

  function drawRocket() {
    const r = state.rocket;
    // Normal flying position
    const normalY = H - ROCKET_SIZE/2 - 95;
    // During takeoff, rocket sits on ground then lifts
    const p = takeoffProgress();
    const eased = easeInOut(p);
    const groundedY = H - GROUND_H - ROCKET_SIZE/2 + 6; // resting on grass
    r.x = W/2;
    r.y = groundedY + (normalY - groundedY) * eased;
    let sx = 0, sy = 0;
    // Pre-launch rumble
    if (state.takeoff && state.takeoff.active && p < 0.35) {
      const rumble = (0.35 - p) * 8;
      sx = (Math.random()-.5)*rumble; sy = (Math.random()-.5)*rumble;
    }
    if (r.shake > 0) { sx = (Math.random()-.5)*r.shake*0.5; sy = (Math.random()-.5)*r.shake*0.3; r.shake--; }
    if (state.current) {
      const remaining = 1 - ((state.current.y + ICON_SIZE/2) / (state.current.maxY + ICON_SIZE/2));
      if (remaining < 0.3) sx += (Math.random()-.5)*4;
    }
    if (r.exploding > 0) {
      r.exploding--;
      if (r.exploding % 4 < 2) return;
    }
    // Draw rocket first so flame appears to emerge from inside the nozzle
    drawImageContained(pctx, rocketImg, r.x + sx, r.y + sy, ROCKET_SIZE);
    // flame: start INSIDE the rocket body so it looks like it's coming out of it
    const liftBoost = state.takeoff && state.takeoff.active ? (1 + (1-p)*1.8) : 1;
    const flameH = (28 + Math.sin(performance.now()/60)*10) * liftBoost;
    const flameW = 16 * Math.min(1.6, liftBoost);
    const flameTopY = r.y + ROCKET_SIZE/2 - 28; // inside the rocket
    const flameBotY = r.y + ROCKET_SIZE/2 - 8 + flameH;
    const fg = pctx.createLinearGradient(0, flameTopY, 0, flameBotY);
    fg.addColorStop(0,'#fff8a0'); fg.addColorStop(0.35,'#ff0'); fg.addColorStop(0.7,'#f80'); fg.addColorStop(1,'#f0000000');
    pctx.fillStyle = fg;
    pctx.beginPath();
    pctx.moveTo(r.x - flameW + sx, flameTopY + sy);
    pctx.quadraticCurveTo(r.x - flameW*1.2 + sx, (flameTopY+flameBotY)/2 + sy, r.x - flameW*0.5 + sx, flameBotY + sy);
    pctx.lineTo(r.x + sx, flameBotY + 8 + sy);
    pctx.lineTo(r.x + flameW*0.5 + sx, flameBotY + sy);
    pctx.quadraticCurveTo(r.x + flameW*1.2 + sx, (flameTopY+flameBotY)/2 + sy, r.x + flameW + sx, flameTopY + sy);
    pctx.closePath(); pctx.fill();
    // bright inner core
    pctx.fillStyle = 'rgba(255,255,220,0.9)';
    pctx.beginPath();
    pctx.moveTo(r.x - flameW*0.4 + sx, flameTopY + 4 + sy);
    pctx.quadraticCurveTo(r.x + sx, flameBotY*0.85 + flameTopY*0.15 + sy, r.x + flameW*0.4 + sx, flameTopY + 4 + sy);
    pctx.closePath(); pctx.fill();
  }

  function drawFalling(obj, now) {
    obj.y += obj.vy;
    drawImageContained(pctx, obj.img, obj.x, obj.y, ICON_SIZE);
    // progress bar (no word shown!)
    const ratio = Math.max(0, Math.min(1, 1 - (obj.y + ICON_SIZE/2) / (obj.maxY + ICON_SIZE/2)));
    const bw = ICON_SIZE - 16;
    pctx.fillStyle = '#0008'; pctx.fillRect(obj.x - bw/2, obj.y + ICON_SIZE/2 + 6, bw, 6);
    pctx.fillStyle = ratio < 0.3 ? '#f33' : ratio < 0.6 ? '#fa0' : '#0f8';
    pctx.fillRect(obj.x - bw/2, obj.y + ICON_SIZE/2 + 6, bw * ratio, 6);
    if (ratio < 0.3 && now - obj.lastTick > 250) { SFX.tick(); obj.lastTick = now; }
    if (obj.y >= obj.maxY) loseLife();
  }

  function drawParticles() {
    for (let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
      if (p.life <= 0) { particles.splice(i,1); continue; }
      fctx.globalAlpha = p.life;
      fctx.fillStyle = p.color;
      fctx.fillRect(p.x, p.y, p.size, p.size);
    }
    fctx.globalAlpha = 1;
  }

  function loop(t) {
    const theme = LEVELS[state.levelIdx]?.background_theme || "space";
    drawBackground(theme, t);
    pctx.clearRect(0,0,W,H);
    fctx.clearRect(0,0,W,H);
    if (state.running) {
      if (state.takeoff && (state.takeoff.active || takeoffProgress() < 1)) drawGround();
      drawRocket();
      if (state.current) drawFalling(state.current, t);
    }
    drawParticles();
    requestAnimationFrame(loop);
  }

  // ===== Input =====
  const input = document.getElementById('input');
  input.addEventListener('input', e => {
    if (!state.running || !state.current) return;
    if (norm(e.target.value) === norm(state.current.word)) hitTarget();
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkWord(input.value); });

  // ===== Speech =====
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null, recOn = false;
  const LANGS = [['en','🇬🇧','en-US'],['fr','🇫🇷','fr-FR'],['es','🇪🇸','es-ES']];
  let langIdx = 0;
  function setupRec() {
    if (!SR) { document.getElementById('mic').style.display = 'none'; return; }
    recognition = new SR();
    recognition.continuous = true; recognition.interimResults = true;
    recognition.lang = LANGS[langIdx][2];
    recognition.onresult = e => {
      let txt = '';
      for (let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
      document.getElementById('spoken').textContent = '🎙 ' + txt;
      txt.split(/\s+/).forEach(w => { if (w) checkWord(w); });
    };
    recognition.onerror = () => {};
    recognition.onend = () => { if (recOn) try { recognition.start(); } catch(e){} };
  }
  setupRec();

  document.getElementById('mic').addEventListener('click', () => {
    if (!recognition) return alert('Reconnaissance vocale non supportée.');
    recOn = !recOn;
    const btn = document.getElementById('mic');
    btn.classList.toggle('on', recOn);
    btn.textContent = recOn ? '🎤 ON' : '🎤 MIC';
    if (recOn) { try { recognition.start(); } catch(e){} } else recognition.stop();
  });
  document.getElementById('lang').addEventListener('click', () => {
    langIdx = (langIdx+1) % LANGS.length;
    document.getElementById('lang').textContent = LANGS[langIdx][1];
    if (recognition) {
      const wasOn = recOn;
      if (recOn) { recOn = false; recognition.stop(); }
      recognition.lang = LANGS[langIdx][2];
      if (wasOn) { recOn = true; try { recognition.start(); } catch(e){} }
    }
  });
  document.getElementById('mute').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('mute').textContent = muted ? '🔇' : '🔊';
  });

  document.getElementById('startBtn').addEventListener('click', () => { ensureAudio(); startGame(); input.focus(); });
  document.getElementById('replayBtn').addEventListener('click', () => { startGame(); input.focus(); });
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !state.running) {
      e.preventDefault();
      if (!document.getElementById('start').classList.contains('hidden')) {
        ensureAudio(); startGame(); input.focus();
      } else if (!document.getElementById('end').classList.contains('hidden')) {
        startGame(); input.focus();
      }
    }
  });

  // ===== Boot =====
  resize();
  requestAnimationFrame(loop);

  fetchLevels().then(async (levels) => {
    LEVELS = levels.filter(l => l.level_objects && l.level_objects.some(o => o.icon_path));
    rocketImg = loadImg('shared/rocket.webp');
    const statusEl = document.getElementById('loadStatus');

    // Start immediately: only warm image cache in the background.
    const firstLevelPaths = LEVELS[0]?.level_objects?.map(o => o.icon_path).filter(Boolean) || [];
    firstLevelPaths.forEach(loadImg);
    setTimeout(() => LEVELS.forEach(l => l.level_objects.forEach(o => { if (o.icon_path) loadImg(o.icon_path); })), 300);

    statusEl.textContent = `${LEVELS.length} niveaux prêts`;
    document.getElementById('startBtn').disabled = false;
  }).catch(err => {
    document.getElementById('loadStatus').textContent = "Erreur de chargement : " + err.message;
  });
})();
</script>
</body>
</html>
