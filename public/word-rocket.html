<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>WORD ROCKET</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff;
    font-family: 'Courier New', monospace; user-select: none; -webkit-tap-highlight-color: transparent; }
  #game { position: relative; width: 100vw; height: 100vh; overflow: hidden;
    background: linear-gradient(to bottom, #02021a 0%, #050530 50%, #0a0540 100%); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #stars, #fx { pointer-events: none; }
  .hud { position: absolute; top: 0; left: 0; right: 0; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
    font-size: 14px; text-shadow: 0 0 6px #0ff; pointer-events: none; }
  .hud > div { background: rgba(0,0,0,.45); border: 2px solid #0ff8; border-radius: 6px; padding: 6px 10px; }
  .hearts { color: #ff3a6b; letter-spacing: 4px; font-size: 18px; }
  .combo { color: #ffd54a; }
  .level { color: #7cf; }
  .score { color: #fff; }
  .bottom { position: absolute; left: 0; right: 0; bottom: 0; padding: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  #input { width: min(360px, 80vw); padding: 10px 14px; border: 2px solid #0ff;
    background: rgba(0,0,0,.6); color: #fff; font-family: inherit; font-size: 16px;
    border-radius: 8px; outline: none; text-align: center; letter-spacing: 2px; }
  #input:focus { box-shadow: 0 0 12px #0ff; }
  button { font-family: inherit; cursor: pointer; padding: 8px 14px; border-radius: 8px;
    border: 2px solid #0ff; background: #021; color: #0ff; font-size: 14px;
    transition: transform .1s, background .2s; }
  button:hover { background: #033; transform: translateY(-2px); }
  button.on { background: #0ff; color: #021; }
  #spoken { min-height: 22px; font-size: 13px; color: #9cf; opacity: .8; text-align: center; }
  .feedback { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 42px; font-weight: bold; opacity: 0; pointer-events: none; z-index: 20;
    text-shadow: 0 0 20px currentColor; }
  .feedback.show { animation: pop 1s ease-out forwards; }
  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
  }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,10,.85); z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center; gap: 20px; }
  .overlay.hidden { display: none; }
  .title { font-size: clamp(40px, 9vw, 84px); font-weight: bold; letter-spacing: 6px;
    background: linear-gradient(90deg, #0ff, #f0f, #ffa500, #0ff);
    background-size: 300% 100%; -webkit-background-clip: text; background-clip: text;
    color: transparent; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { to { background-position: 300% 0; } }
  .subtitle { font-size: 14px; color: #aaa; max-width: 480px; line-height: 1.6; }
  .big { padding: 14px 32px; font-size: 18px; letter-spacing: 3px; }
  .endlist { max-width: 90vw; max-height: 30vh; overflow-y: auto; padding: 10px;
    border: 1px solid #0ff8; border-radius: 8px; background: rgba(0,0,0,.4);
    font-size: 13px; color: #fc6; }
  .level-banner { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; z-index: 25; pointer-events: none; opacity: 0; }
  .level-banner.show { animation: levelIn 2.5s ease-in-out forwards; }
  @keyframes levelIn {
    0% { opacity: 0; transform: scale(.5); }
    20%,80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5); }
  }
  .lb-text { font-size: clamp(36px, 8vw, 72px); font-weight: bold;
    color: #0ff; text-shadow: 0 0 30px #0ff, 0 0 60px #f0f; letter-spacing: 8px; }
  @media (max-width: 600px) {
    .hud { font-size: 12px; padding: 8px; }
    .hud > div { padding: 4px 8px; }
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="stars"></canvas>
  <canvas id="play"></canvas>
  <canvas id="fx"></canvas>

  <div class="hud">
    <div class="score">SCORE <span id="score">0</span></div>
    <div class="level">LVL <span id="lvl">1</span></div>
    <div class="combo">x<span id="mult">1</span> <span id="combo">0</span></div>
    <div class="hearts" id="hearts">♥♥♥</div>
  </div>

  <div class="bottom">
    <div id="spoken"></div>
    <input id="input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="type the word..." />
    <div class="row">
      <button id="mic">🎤 MIC</button>
      <button id="lang">🌐 EN</button>
      <button id="mute">🔊</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="level-banner" id="banner"><div class="lb-text" id="bannerText"></div></div>

  <div class="overlay" id="start">
    <div class="title">WORD ROCKET</div>
    <div class="subtitle">Des objets tombent du ciel. Tape ou prononce le mot anglais avant qu'il ne touche ta fusée.
      <br>5 niveaux, 10 mots chacun. Combo x2 après 3 mots, x3 après 5.</div>
    <button class="big" id="startBtn">START</button>
    <div class="subtitle">Cliquez ou appuyez sur ESPACE</div>
  </div>

  <div class="overlay hidden" id="end">
    <div class="title" style="font-size: clamp(32px,7vw,60px)">GAME OVER</div>
    <div id="endStats" style="font-size:18px;line-height:1.8"></div>
    <div id="missed" class="endlist"></div>
    <button class="big" id="replayBtn">REJOUER</button>
  </div>
</div>

<script>
(() => {
  // ===== Word lists =====
  const LEVELS = [
    { name: "BEGINNER", fallDuration: 4.0, words: ["cat","dog","sun","tree","car","book","door","fish","bird","star"] },
    { name: "ELEMENTARY", fallDuration: 3.2, words: ["flower","river","cloud","table","chair","bread","stone","fire","ocean","mouse"] },
    { name: "INTERMEDIATE", fallDuration: 2.6, words: ["jump","smile","bright","shadow","forest","bridge","bottle","candle","mirror","thunder"] },
    { name: "ADVANCED", fallDuration: 2.1, words: ["gravity","oxygen","molecule","eclipse","volcano","nucleus","antenna","friction","neutron","compass"] },
    { name: "EXPERT", fallDuration: 1.7, words: ["algorithm","phosphorus","kaleidoscope","metamorphosis","cryptography","photosynthesis","circumference","catastrophe","combustion","stratosphere"] },
  ];

  // ===== Canvases =====
  const starsC = document.getElementById('stars');
  const playC = document.getElementById('play');
  const fxC = document.getElementById('fx');
  const sctx = starsC.getContext('2d');
  const pctx = playC.getContext('2d');
  const fctx = fxC.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    [starsC, playC, fxC].forEach(c => {
      c.width = W * DPR; c.height = H * DPR;
      c.style.width = W + 'px'; c.style.height = H + 'px';
      c.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
    });
    initStars();
  }
  window.addEventListener('resize', resize);

  // ===== Stars + planets parallax =====
  let stars = [], planets = [];
  function initStars() {
    stars = []; planets = [];
    const n = Math.floor(W*H/4000);
    for (let i=0;i<n;i++) stars.push({ x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+.3, s:Math.random()*0.3+0.05, tw:Math.random()*Math.PI*2 });
    for (let i=0;i<3;i++) planets.push({
      x: Math.random()*W, y: Math.random()*H*0.6,
      r: 20+Math.random()*40, s: 0.05+Math.random()*0.1,
      color: ['#f0a','#0af','#fa0','#a0f','#0fa'][Math.floor(Math.random()*5)]
    });
  }

  function drawBG(t) {
    sctx.clearRect(0,0,W,H);
    // planets
    planets.forEach(p => {
      p.y += p.s;
      if (p.y - p.r > H) { p.y = -p.r; p.x = Math.random()*W; }
      const g = sctx.createRadialGradient(p.x-p.r*0.3, p.y-p.r*0.3, p.r*0.1, p.x, p.y, p.r);
      g.addColorStop(0, p.color);
      g.addColorStop(1, '#000');
      sctx.fillStyle = g;
      sctx.beginPath(); sctx.arc(p.x, p.y, p.r, 0, Math.PI*2); sctx.fill();
    });
    // stars
    stars.forEach(s => {
      s.y += s.s; s.tw += 0.05;
      if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
      sctx.globalAlpha = 0.5 + Math.sin(s.tw)*0.5;
      sctx.fillStyle = '#fff';
      sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill();
    });
    sctx.globalAlpha = 1;
  }

  // ===== Audio (Web Audio API) =====
  let actx = null, muted = false;
  function ensureAudio() { if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }
  function beep(freq, dur=0.1, type='square', vol=0.08) {
    if (muted) return;
    try {
      ensureAudio();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + dur);
    } catch(e){}
  }
  const SFX = {
    hit: () => { beep(880,.08); setTimeout(()=>beep(1320,.1),60); },
    miss: () => { beep(160,.3,'sawtooth',.1); },
    boom: () => { for (let i=0;i<6;i++) setTimeout(()=>beep(80+Math.random()*120,.15,'sawtooth',.1), i*40); },
    levelup: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,'triangle',.08), i*100)); },
    tick: () => { beep(220,.04,'square',.04); },
    start: () => { [392,523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.12,'square',.08), i*80)); },
  };

  // ===== Sprite drawing (pixel art via canvas) =====
  const PIXEL = 4;
  function drawSprite(ctx, x, y, grid, palette, scale=PIXEL) {
    for (let r=0; r<grid.length; r++) {
      for (let c=0; c<grid[r].length; c++) {
        const v = grid[r][c];
        if (v === 0 || v === ' ' || v === '.') continue;
        ctx.fillStyle = palette[v] || '#fff';
        ctx.fillRect(x + c*scale, y + r*scale, scale, scale);
      }
    }
  }
  // pixel grids (compact)
  const SPRITES = {
    meteor: { g: [
      "..333..",
      ".33223.",
      "3221123",
      "3211123",
      "3221233",
      ".33233.",
      "..333..",
    ], p: { 1:'#ffd', 2:'#f93', 3:'#a40' }},
    alien: { g: [
      "..2222..",
      ".222222.",
      ".211112.",
      ".212212.",
      ".211112.",
      "22222222",
      "2.2..2.2",
      "2.2..2.2",
    ], p: { 1:'#000', 2:'#3f0' }},
    asteroid: { g: [
      "..1111..",
      ".112221.",
      "11222211",
      "12222221",
      "11212221",
      ".112221.",
      "..1111..",
    ], p: { 1:'#555', 2:'#888' }},
    satellite: { g: [
      "1.....1.....1",
      "1.....1.....1",
      "1111122211111",
      "1111122211111",
      "1.....1.....1",
      "1.....3.....1",
      "......3......",
    ], p: { 1:'#aaa', 2:'#fc0', 3:'#666' }},
    ufo: { g: [
      "...22222...",
      "..2111112..",
      "33333333333",
      "34343434343",
      "33333333333",
      "..3.....3..",
    ], p: { 1:'#9ef', 2:'#0ff', 3:'#888', 4:'#fa0' }},
    bomb: { g: [
      "....44....",
      "...4..4...",
      "..111111..",
      ".11111111.",
      ".11111111.",
      ".11111111.",
      "..111111..",
    ], p: { 1:'#222', 4:'#fa0' }},
    comet: { g: [
      "5.........",
      ".5........",
      "..51......",
      ".5112.....",
      "..51122...",
      ".5.122....",
      "....2.....",
    ], p: { 1:'#fff', 2:'#fc6', 5:'#9cf' }},
    crystal: { g: [
      "...22...",
      "..2112..",
      ".211112.",
      "21111112",
      ".211112.",
      "..2112..",
      "...22...",
    ], p: { 1:'#9ff', 2:'#0aa' }},
  };
  const SPRITE_KEYS = Object.keys(SPRITES);

  // ===== Game state =====
  const state = {
    running: false, level: 0, score: 0, lives: 3, combo: 0,
    queue: [], current: null, missed: [], correct: 0, attempted: 0,
    rocket: { x: 0, y: 0, w: 60, h: 80, shake: 0, exploding: 0 },
  };
  const particles = [];

  function newFalling() {
    if (state.queue.length === 0) return null;
    const word = state.queue.shift();
    const spriteKey = SPRITE_KEYS[Math.floor(Math.random()*SPRITE_KEYS.length)];
    const maxY = H - 140;
    return {
      word, sprite: spriteKey,
      x: 60 + Math.random() * (W - 120),
      y: -60,
      vy: (maxY + 60) / (LEVELS[state.level].fallDuration * 60),
      maxY,
      tStart: performance.now(),
      duration: 0, // computed
      lastTick: 0,
    };
  }

  function startGame() {
    SFX.start();
    state.level = 0; state.score = 0; state.lives = 3; state.combo = 0;
    state.missed = []; state.correct = 0; state.attempted = 0;
    loadLevel();
    document.getElementById('start').classList.add('hidden');
    document.getElementById('end').classList.add('hidden');
    state.running = true;
    showBanner('LEVEL 1 - ' + LEVELS[0].name);
    nextObject();
    updateHUD();
  }

  function loadLevel() {
    state.queue = [...LEVELS[state.level].words].sort(()=>Math.random()-.5);
  }

  function nextObject() {
    if (!state.running) return;
    if (state.queue.length === 0) {
      // level up
      if (state.level >= LEVELS.length-1) return endGame(true);
      state.level++;
      loadLevel();
      SFX.levelup();
      showBanner('LEVEL ' + (state.level+1) + ' - ' + LEVELS[state.level].name);
      updateHUD();
      setTimeout(nextObject, 2000);
      return;
    }
    state.current = newFalling();
    document.getElementById('input').value = '';
    document.getElementById('spoken').textContent = '';
  }

  function checkWord(text) {
    if (!state.running || !state.current) return;
    const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
    const t = norm(text);
    if (!t) return;
    document.getElementById('spoken').textContent = '🎙 ' + text;
    if (t === norm(state.current.word)) {
      hitTarget();
    } else if (state.current && t.length >= state.current.word.length) {
      // shake input feedback
      const inp = document.getElementById('input');
      inp.style.borderColor = '#f44';
      setTimeout(()=>{ inp.style.borderColor = '#0ff'; inp.value=''; }, 200);
      showFeedback('Essaie encore !', '#f66');
    }
  }

  function hitTarget() {
    const c = state.current;
    SFX.hit();
    state.combo++; state.correct++; state.attempted++;
    const mult = state.combo >= 5 ? 3 : state.combo >= 3 ? 2 : 1;
    state.score += 100 * mult * (state.level+1);
    explode(c.x, c.y + 30, ['#ff0','#f80','#f08','#0ff']);
    showFeedback('Bien dit ! +' + (100*mult*(state.level+1)), '#0f8');
    state.current = null;
    updateHUD();
    setTimeout(nextObject, 400);
  }

  function loseLife() {
    SFX.boom();
    state.lives--; state.combo = 0; state.attempted++;
    if (state.current) state.missed.push(state.current.word);
    state.rocket.shake = 30; state.rocket.exploding = 20;
    explode(state.rocket.x, state.rocket.y, ['#f00','#fa0','#ff0','#fff']);
    showFeedback('-1 ❤', '#f33');
    state.current = null;
    updateHUD();
    if (state.lives <= 0) { setTimeout(()=>endGame(false), 800); return; }
    setTimeout(nextObject, 1000);
  }

  function endGame(won) {
    state.running = false;
    document.getElementById('end').classList.remove('hidden');
    const acc = state.attempted ? Math.round(100*state.correct/state.attempted) : 0;
    document.getElementById('endStats').innerHTML =
      `Score : <b>${state.score}</b><br>Niveau atteint : <b>${state.level+1}/${LEVELS.length}</b><br>Réussite : <b>${acc}%</b>${won?'<br>🏆 VICTOIRE !':''}`;
    const m = document.getElementById('missed');
    m.innerHTML = state.missed.length ? '<b>Mots à réviser :</b><br>' + state.missed.join(' · ') : '<i>Aucun mot raté ! 🌟</i>';
  }

  function explode(x, y, colors) {
    for (let i=0; i<40; i++) {
      const a = Math.random()*Math.PI*2, s = Math.random()*4+1;
      particles.push({
        x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        life: 1, color: colors[Math.floor(Math.random()*colors.length)],
        size: Math.random()*3+1,
      });
    }
  }

  function updateHUD() {
    document.getElementById('score').textContent = state.score;
    document.getElementById('lvl').textContent = state.level+1;
    document.getElementById('hearts').textContent = '♥'.repeat(state.lives) + '♡'.repeat(Math.max(0,3-state.lives));
    const m = state.combo >= 5 ? 3 : state.combo >= 3 ? 2 : 1;
    document.getElementById('mult').textContent = m;
    document.getElementById('combo').textContent = state.combo;
  }

  function showFeedback(text, color) {
    const f = document.getElementById('feedback');
    f.textContent = text; f.style.color = color;
    f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
  }
  function showBanner(text) {
    const b = document.getElementById('banner'); const bt = document.getElementById('bannerText');
    bt.textContent = text;
    b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
  }

  // ===== Render loop =====
  function drawRocket() {
    const r = state.rocket;
    r.x = W/2; r.y = H - 100;
    let sx = 0, sy = 0;
    if (r.shake > 0) { sx = (Math.random()-.5)*r.shake*0.5; sy = (Math.random()-.5)*r.shake*0.3; r.shake--; }
    // approach shake
    if (state.current) {
      const elapsed = (performance.now() - state.current.tStart) / 1000;
      const total = (state.current.maxY - (-60)) / (state.current.vy * 60);
      const remaining = 1 - elapsed/total;
      if (remaining < 0.3) { sx += (Math.random()-.5)*4; }
    }
    pctx.save();
    pctx.translate(r.x + sx, r.y + sy);
    if (r.exploding > 0) {
      r.exploding--;
      // skip drawing for blink effect
      if (r.exploding % 4 < 2) { pctx.restore(); return; }
    }
    // flame
    const flameH = 20 + Math.sin(performance.now()/60)*8;
    const fg = pctx.createLinearGradient(0, 30, 0, 30+flameH);
    fg.addColorStop(0,'#ff0'); fg.addColorStop(0.5,'#f80'); fg.addColorStop(1,'#f00');
    pctx.fillStyle = fg;
    pctx.beginPath();
    pctx.moveTo(-10, 30); pctx.lineTo(10, 30);
    pctx.lineTo(6, 30+flameH); pctx.lineTo(0, 30+flameH+8); pctx.lineTo(-6, 30+flameH);
    pctx.closePath(); pctx.fill();
    // rocket body (pixel art)
    const rocketGrid = [
      "..11..",
      ".1221.",
      ".1221.",
      "122221",
      "123321",
      "122221",
      "1.22.1",
      "1.11.1",
    ];
    const pal = { 1:'#ccc', 2:'#e33', 3:'#0cf' };
    drawSprite(pctx, -12, -30, rocketGrid, pal, 4);
    pctx.restore();
  }

  function drawFalling(obj, now) {
    obj.y += obj.vy;
    // sprite
    const sp = SPRITES[obj.sprite];
    const sw = sp.g[0].length * 4, sh = sp.g.length * 4;
    drawSprite(pctx, obj.x - sw/2, obj.y - sh/2, sp.g, sp.p, 4);
    // word
    pctx.fillStyle = '#fff';
    pctx.strokeStyle = '#000'; pctx.lineWidth = 3;
    pctx.font = 'bold 18px Courier New';
    pctx.textAlign = 'center';
    pctx.strokeText(obj.word, obj.x, obj.y + sh/2 + 22);
    pctx.fillText(obj.word, obj.x, obj.y + sh/2 + 22);
    // progress bar
    const total = (obj.maxY - (-60)) / obj.vy;
    const elapsed = (obj.y - (-60)) / obj.vy;
    const ratio = Math.max(0, Math.min(1, 1 - elapsed/total));
    const bw = 60;
    pctx.fillStyle = '#222'; pctx.fillRect(obj.x - bw/2, obj.y + sh/2 + 30, bw, 6);
    pctx.fillStyle = ratio < 0.3 ? '#f33' : ratio < 0.6 ? '#fa0' : '#0f8';
    pctx.fillRect(obj.x - bw/2, obj.y + sh/2 + 30, bw * ratio, 6);
    // tick sound when urgent
    if (ratio < 0.3 && now - obj.lastTick > 250) { SFX.tick(); obj.lastTick = now; }
    // collision
    if (obj.y >= obj.maxY) loseLife();
  }

  function drawParticles() {
    for (let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
      if (p.life <= 0) { particles.splice(i,1); continue; }
      fctx.globalAlpha = p.life;
      fctx.fillStyle = p.color;
      fctx.fillRect(p.x, p.y, p.size, p.size);
    }
    fctx.globalAlpha = 1;
  }

  function loop(t) {
    drawBG(t);
    pctx.clearRect(0,0,W,H);
    fctx.clearRect(0,0,W,H);
    if (state.running) {
      drawRocket();
      if (state.current) drawFalling(state.current, t);
    }
    drawParticles();
    requestAnimationFrame(loop);
  }

  // ===== Input =====
  const input = document.getElementById('input');
  input.addEventListener('input', e => {
    if (!state.running || !state.current) return;
    const v = e.target.value.trim();
    const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
    if (norm(v) === norm(state.current.word)) hitTarget();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkWord(input.value);
  });

  // ===== Speech recognition =====
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null, recOn = false;
  const LANGS = [['en','English','en-US'],['fr','Français','fr-FR'],['es','Español','es-ES']];
  let langIdx = 0;
  function setupRec() {
    if (!SR) { document.getElementById('mic').style.display = 'none'; return; }
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = LANGS[langIdx][2];
    recognition.onresult = e => {
      let txt = '';
      for (let i=e.resultIndex; i<e.results.length; i++) txt += e.results[i][0].transcript;
      document.getElementById('spoken').textContent = '🎙 ' + txt;
      // check each word
      txt.split(/\s+/).forEach(w => { if (w) checkWord(w); });
    };
    recognition.onerror = () => {};
    recognition.onend = () => { if (recOn) try { recognition.start(); } catch(e){} };
  }
  setupRec();

  document.getElementById('mic').addEventListener('click', () => {
    if (!recognition) return alert('Reconnaissance vocale non supportée. Tape les mots !');
    recOn = !recOn;
    const btn = document.getElementById('mic');
    btn.classList.toggle('on', recOn);
    btn.textContent = recOn ? '🎤 ON' : '🎤 MIC';
    if (recOn) { try { recognition.start(); } catch(e){} } else recognition.stop();
  });
  document.getElementById('lang').addEventListener('click', () => {
    langIdx = (langIdx+1) % LANGS.length;
    document.getElementById('lang').textContent = '🌐 ' + LANGS[langIdx][1];
    if (recognition) {
      const wasOn = recOn;
      if (recOn) { recOn = false; recognition.stop(); }
      recognition.lang = LANGS[langIdx][2];
      if (wasOn) { recOn = true; try { recognition.start(); } catch(e){} }
    }
  });
  document.getElementById('mute').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('mute').textContent = muted ? '🔇' : '🔊';
  });

  document.getElementById('startBtn').addEventListener('click', () => { ensureAudio(); startGame(); input.focus(); });
  document.getElementById('replayBtn').addEventListener('click', () => { startGame(); input.focus(); });
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !state.running) {
      e.preventDefault();
      if (!document.getElementById('start').classList.contains('hidden')) {
        ensureAudio(); startGame(); input.focus();
      } else if (!document.getElementById('end').classList.contains('hidden')) {
        startGame(); input.focus();
      }
    }
  });

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
